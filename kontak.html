<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - Hendra Pratama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] } } } }</script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Merriweather:wght@700&display=swap'); body { font-family: 'Inter', sans-serif; } h1, h2, h3 { font-family: 'Merriweather', serif; }</style>
</head>
<body class="bg-slate-50 pt-20">

    <nav class="fixed top-0 w-full z-50 bg-slate-900/95 backdrop-blur-sm border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center"><i class="ph-fill ph-scales text-[32px] text-amber-500 mr-2"></i><div><h1 class="text-white text-xl font-bold">HENDRA PRATAMA</h1></div></a>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="text-slate-300 hover:text-amber-500 text-sm font-medium">Beranda</a>
                    <a href="profil.html" class="text-slate-300 hover:text-amber-500 text-sm font-medium">Profil</a>
                    <a href="layanan.html" class="text-slate-300 hover:text-amber-500 text-sm font-medium">Layanan</a>
                    <a href="pengalaman.html" class="text-slate-300 hover:text-amber-500 text-sm font-medium">Pengalaman</a>
                    <a href="kontak.html" class="bg-amber-600 text-white px-5 py-2 rounded-sm text-sm font-medium">Konsultasi</a>
                </div>
                <div class="md:hidden flex items-center"><button onclick="toggleMenu()" class="text-white"><i class="ph ph-list text-3xl"></i></button></div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-slate-900 border-t border-slate-800">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <a href="index.html" class="block px-3 py-4 text-slate-300 border-b border-slate-800">Beranda</a>
                <a href="kontak.html" class="block px-3 py-4 text-amber-500 border-b border-slate-800">Kontak</a>
            </div>
        </div>
    </nav>

    <section class="py-24 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            <div>
                <h3 class="text-amber-600 font-semibold uppercase text-sm mb-2">Hubungi Saya</h3>
                <h2 class="text-3xl font-bold text-slate-900 mb-6">Mari Diskusikan Kebutuhan Hukum Anda</h2>
                <div class="space-y-6 mt-10">
                    <div class="flex items-start">
                        <i class="ph-fill ph-map-pin text-[24px] text-amber-600 mr-4 mt-1"></i>
                        <div><h4 class="font-bold">Kantor</h4><p class="text-slate-600 text-sm mt-1">Gedung Sudirman Center Lt. 15<br/>Jakarta Selatan</p></div>
                    </div>
                    <div class="flex items-start">
                        <i class="ph-fill ph-envelope-simple text-[24px] text-amber-600 mr-4 mt-1"></i>
                        <div><h4 class="font-bold">Email</h4><p class="text-slate-600 text-sm mt-1">contact@hendrapratama.law</p></div>
                    </div>
                </div>
            </div>
            
            <div class="bg-white p-8 rounded-sm shadow-xl border border-slate-100">
                <form onsubmit="event.preventDefault();">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-700 mb-2">Nama Lengkap</label>
                        <input type="text" class="w-full px-4 py-3 bg-slate-50 border rounded-sm" placeholder="Nama Anda">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                        <input type="email" class="w-full px-4 py-3 bg-slate-50 border rounded-sm" placeholder="email@anda.com">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-700 mb-2">Pesan</label>
                        <textarea rows="4" class="w-full px-4 py-3 bg-slate-50 border rounded-sm"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white font-medium py-4 rounded-sm">Kirim Pesan</button>
                </form>
            </div>
        </div>
    </section>

    <script>function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }</script>
</body>
</html>
